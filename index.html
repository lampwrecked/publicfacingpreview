<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>PUBLIC FACING — Coming Soon</title>
<meta name="description" content="Public Facing by Lampwrecked — coming soon.">
<link rel="canonical" href="https://publicfacingpreview.lampwrecked.art/">
<meta property="og:title" content="Public Facing — Coming Soon">
<meta property="og:description" content="An open edition by Lampwrecked. Coming soon.">
<meta property="og:url" content="https://publicfacingpreview.lampwrecked.art/">
<meta name="twitter:card" content="summary_large_image">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

<style>
  /* Palette pulled from publicfacing.vercel.app */
  :root {
    --page:      #000000;
    --card:      #faf9f7;
    --rule:      #1a1814;
    --ink:       #1a1814;
    --ink-soft:  #9a9285;
    --ink-faint: #b8b0a2;
    --window:    #0a0907;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--page);
    color: var(--ink);
    font-family: "EB Garamond", Garamond, "Times New Roman", serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100%;
  }

  body {
    padding: clamp(20px, 6vw, 48px) clamp(16px, 5vw, 40px) clamp(40px, 8vw, 80px);
  }

  main {
    max-width: 560px;
    margin: 0 auto;
  }

  /* ---------------- matte (polaroid) ---------------- */

  .matte {
    background: var(--card);
    border: 1px solid var(--rule);
    padding: clamp(14px, 3.5vw, 22px) clamp(14px, 3.5vw, 22px) clamp(20px, 5vw, 32px);
  }

  .window {
    position: relative;
    aspect-ratio: 1 / 1;
    width: 100%;
    background: var(--window);
    overflow: hidden;
  }

  .layer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    will-change: opacity;
  }

  /* Ghost layers render at 30% opacity for a translucent overlay effect */
  .layer[data-layer="Ghost 1"],
  .layer[data-layer="Ghost 2"] {
    opacity: 0.3;
  }

  .layer.placeholder {
    background: var(--ph-color, #555);
    mix-blend-mode: screen;
    opacity: var(--ph-opacity, 0.85);
  }

  .placard {
    text-align: center;
    margin-top: clamp(18px, 4.5vw, 28px);
  }

  .placard-rule {
    width: 22%;
    height: 1px;
    margin: 0 auto clamp(14px, 3vw, 20px);
    background: var(--ink-soft);
    opacity: 0.55;
  }

  .placard .title {
    font-family: "Cormorant Garamond", "EB Garamond", serif;
    font-weight: 400;
    font-size: clamp(20px, 5.6vw, 30px);
    letter-spacing: 0.32em;
    text-transform: uppercase;
    line-height: 1.1;
    color: var(--ink);
  }

  .placard .by {
    margin-top: clamp(6px, 1.6vw, 10px);
    font-style: italic;
    font-size: clamp(12px, 2.8vw, 14px);
    letter-spacing: 0.04em;
    color: var(--ink);
  }
  .placard .by .name {
    font-style: normal;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-size: 0.92em;
  }

  .placard .status {
    margin-top: clamp(14px, 3.6vw, 20px);
    font-family: "Cormorant Garamond", serif;
    font-size: clamp(10px, 2.4vw, 11.5px);
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--ink-soft);
    padding-left: 0.5em;
  }

  /* ---------------- invite list (separate bubble) ---------------- */

  .invite {
    margin-top: clamp(20px, 5vw, 32px);
    background: var(--card);
    border: 1px solid var(--rule);
    padding: clamp(18px, 4.5vw, 28px) clamp(18px, 4.5vw, 28px) clamp(20px, 5vw, 30px);
    text-align: center;
  }

  .invite-label {
    font-family: "Cormorant Garamond", serif;
    font-size: clamp(11px, 2.6vw, 13px);
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--ink);
    padding-left: 0.5em;
  }

  .invite-form {
    margin: clamp(14px, 3.4vw, 20px) auto 0;
    display: flex;
    align-items: stretch;
    justify-content: center;
    max-width: 380px;
    border-bottom: 1px solid var(--rule);
    padding: 4px 0 2px;
    transition: border-color 0.2s;
  }
  .invite-form:focus-within { border-bottom-color: var(--ink); }

  .invite-form input {
    flex: 1;
    min-width: 0;
    background: transparent;
    border: 0;
    outline: 0;
    font-family: "EB Garamond", serif;
    font-size: clamp(13px, 3.4vw, 15px);
    color: var(--ink);
    padding: 6px 4px;
    letter-spacing: 0.02em;
  }
  .invite-form input::placeholder {
    color: var(--ink-faint);
    font-style: italic;
  }

  .invite-form button {
    background: transparent;
    border: 0;
    cursor: pointer;
    font-family: "Cormorant Garamond", serif;
    font-weight: 400;
    font-size: clamp(10px, 2.4vw, 11.5px);
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: var(--ink);
    padding: 6px 4px 6px 14px;
    transition: opacity 0.2s, transform 0.2s;
    white-space: nowrap;
  }
  .invite-form button:hover { opacity: 0.55; }
  .invite-form button:active { transform: translateX(1px); }
  .invite-form button:disabled { opacity: 0.3; cursor: default; }

  .invite-msg {
    margin-top: clamp(10px, 2.4vw, 14px);
    min-height: 1.2em;
    font-style: italic;
    font-size: clamp(11px, 2.6vw, 13px);
    color: var(--ink-soft);
    letter-spacing: 0.02em;
    line-height: 1.4;
  }
  .invite-msg.error { color: #6b2a1f; }
</style>
</head>
<body>

<main>
  <article class="matte" role="img" aria-label="Public Facing — portrait in flux">
    <div class="window" id="window"></div>

    <div class="placard">
      <div class="placard-rule"></div>
      <h2 class="title">Public&nbsp;Facing</h2>
      <p class="by">by <span class="name">Lampwrecked</span></p>
      <p class="status">Coming Soon</p>
    </div>
  </article>

  <aside class="invite" id="invite">
    <p class="invite-label">Stay in the Loop</p>
    <form id="signupForm" class="invite-form" novalidate>
      <input
        type="email"
        name="email"
        id="emailInput"
        required
        placeholder="your@email"
        autocomplete="email"
        spellcheck="false"
        autocapitalize="off"
        aria-label="Email address"
      >
      <button type="submit" id="submitBtn">Add Me</button>
    </form>
    <p class="invite-msg" id="rsvpMsg" aria-live="polite"></p>
  </aside>
</main>

<script>
  /* ============================================================
     TRAIT CONFIG — Public Facing layer composition
     ----------------------------------------------------------------
     BASE          your Cloudflare R2 / Workers URL (must end with /)
     EXT           file extension your trait images use
     TRAIT_LAYERS  back → front render order. `folder` must match
                   the folder name in your R2 bucket — adjust the
                   slugs below if your bucket uses different casing
                   or separators (e.g. "Ghost1" / "ghost_1" / etc.)
     TRAIT_NAMES   filenames (without extension) from column B of
                   the Layers Google Sheet — used across all layers
     ============================================================ */
  const BASE = "https://pub-3e06ecff65d04bde885d3d4485d0c630.r2.dev/";
  const EXT  = "png";                            // <-- adjust if needed

  const TRAIT_LAYERS = [
    { name: "Base",      folder: "Base",      suffix: ""       },
    { name: "Ghost 1",   folder: "Ghost 1",   suffix: ""       },
    { name: "Ghost 2",   folder: "Ghost 2",   suffix: ""       },
    { name: "Head",      folder: "Head",      suffix: "_head"  },
    { name: "Mouth",     folder: "Mouth",     suffix: "_jaw"   },
    { name: "Right Eye", folder: "Right Eye", suffix: "_r_eye" },
    { name: "Nose",      folder: "Nose",      suffix: "_nose"  },
    { name: "Left Eye",  folder: "Left Eye",  suffix: "_l_eye" }
  ];

  const TRAIT_NAMES = [
    "1568_Giorgio_Vasari",
    "1580_Marietta_Robusti",
    "1637_Johann_Wilhelm_Baur",
    "1659_Rembrandt_van_Rijn",
    "1686_Carlo_Dolci",
    "1744_Jean-Etienne_Liotard",
    "1778_Jan_Piotr_Norblin",
    "1783_Kang_Sehwang",
    "1783_Marie_Gabrielle_Capet",
    "1786_Gilbert_Stuart",
    "1787_Angelica_Kauffmann",
    "1791_Rose_Adelaide_Ducreux",
    "1793_Anne_Gueret",
    "1796_Jean_Jacques_de_Boissieu",
    "1801_Motoori_Norinaga",
    "1805_Charlotte_Martner",
    "1815_Samuel_Lovett_Waldo",
    "1827_John_Frazee",
    "1840_Francois_Marius_Granet",
    "1853_Sanford_Robinson_Gifford",
    "1857_Edgar_Degas_3",
    "1861_HenryBonaventure_Monnier",
    "1872_Paul_Cezanne",
    "1885_Henri-Charles_Guerard",
    "1887_Vincent_van_Gogh_2",
    "1887_Vincent_van_Gogh",
    "1889_Vincent_van_Gogh",
    "1891_Violet_Duchess_of_Rutland",
    "1893_George_Benjamin_Luks",
    "1905_Alice_Pike_Barney",
    "1905_Peter_Sheaf_Hersey_Newell",
    "1906_Pablo_Picasso",
    "1907_Paula_Modersohn-Becker",
    "1910_Augusto_Giacometti",
    "1911_Vilhelm_Hammershoi",
    "1912_Egon_Schiele",
    "1916_Anders_Zorn",
    "1916_Theo_Van_Rysselberghe",
    "1920_Cees_Tromp",
    "1920_Otto_Mueller",
    "1924_Harold_Weston",
    "1928_Karoly_Patko",
    "1930_Amrita_Sher-Gil",
    "1930_Ernst_Neumann",
    "1931_Amrita_Sher-Gil",
    "1941_Samuel_Joseph_Brown_Jr",
    "1947_Pierre_Bonnard",
    "2008_Lampwrecked"
  ];

  const PLACEHOLDER_TINTS = [
    "#5a3a2a", "#3a4a5a", "#7a6a4a", "#4a5a3a",
    "#6a3a4a", "#3a5a4a", "#5a4a6a", "#4a3a3a"
  ];

  const INTERVAL_MS = 1000;  // ms between full-face swaps

  /* ---------- build layer stack ---------- */
  const windowEl = document.getElementById("window");
  const layerImgs = [];
  const layerSources = [];   // every possible URL per layer
  const loadedPool   = [];   // grows as images successfully load

  TRAIT_LAYERS.forEach((layer, i) => {
    const img = document.createElement("img");
    img.className = "layer";
    img.alt = "";
    img.setAttribute("aria-hidden", "true");
    img.dataset.layer = layer.folder;
    windowEl.appendChild(img);
    layerImgs.push(img);

    const urls = TRAIT_NAMES.map(n => `${BASE}${encodeURIComponent(layer.folder)}/${n}${layer.suffix}.${EXT}`);
    layerSources.push(urls);
    loadedPool.push([]);
  });

  function activatePlaceholder(idx) {
    const img = layerImgs[idx];
    img.classList.add("placeholder");
    img.style.setProperty("--ph-color", PLACEHOLDER_TINTS[idx % PLACEHOLDER_TINTS.length]);
    img.style.setProperty("--ph-opacity", idx === 0 ? "1" : "0.55");
    img.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='1' height='1'/>";
  }

  /* ---------- lazy preload: cycle begins as soon as anything loads ---------- */
  layerSources.forEach((urls, i) => {
    urls.forEach(url => {
      const im = new Image();
      im.onload = () => {
        loadedPool[i].push(url);
        if (loadedPool[i].length === 1) layerImgs[i].src = url;
      };
      im.onerror = () => {};
      im.src = url;
    });
  });

  /* If a layer has loaded nothing after a grace period, show placeholder */
  setTimeout(() => {
    loadedPool.forEach((pool, i) => {
      if (pool.length === 0) activatePlaceholder(i);
    });
  }, 4000);

  /* ---------- randomize loop — staggered so one face morphs into the next ---------- */
  const STAGGER_MS = INTERVAL_MS / layerImgs.length;
  layerImgs.forEach((img, i) => {
    const tick = () => {
      const pool = loadedPool[i];
      if (pool.length < 2) return;
      let next = img.src;
      for (let t = 0; t < 4 && next === img.src; t++) {
        next = pool[Math.floor(Math.random() * pool.length)];
      }
      img.src = next;
    };
    setTimeout(() => setInterval(tick, INTERVAL_MS), i * STAGGER_MS);
  });

  /* ============================================================
     EMAIL SIGNUP — set ENDPOINT below.
       Formspree:  "https://formspree.io/f/YOUR_FORM_ID"  (FORMAT="json")
       Vercel/Upstash:  "/api/subscribe"                  (FORMAT="json")
       Buttondown: "https://buttondown.email/api/emails/embed-subscribe/USERNAME"
                                                          (FORMAT="form")
     ============================================================ */
  const ENDPOINT = "/api/subscribe";
  const FORMAT   = "json";

  const signupForm = document.getElementById("signupForm");
  const emailInput = document.getElementById("emailInput");
  const submitBtn  = document.getElementById("submitBtn");
  const rsvpMsg    = document.getElementById("rsvpMsg");

  const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  function setMsg(text, isError) {
    rsvpMsg.textContent = text;
    rsvpMsg.classList.toggle("error", !!isError);
  }

  signupForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = emailInput.value.trim();

    if (!EMAIL_RE.test(email)) {
      setMsg("Please enter a valid email.", true);
      emailInput.focus();
      return;
    }

    submitBtn.disabled = true;
    setMsg("Sending…");

    try {
      let res;
      if (FORMAT === "form") {
        const body = new URLSearchParams();
        body.append("email", email);
        res = await fetch(ENDPOINT, { method: "POST", body });
      } else {
        res = await fetch(ENDPOINT, {
          method: "POST",
          headers: { "Accept": "application/json", "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });
      }

      if (res.ok || res.status === 302) {
        signupForm.style.display = "none";
        setMsg("You're on the list. Notice will arrive at opening.");
      } else {
        throw new Error("Bad response: " + res.status);
      }
    } catch (err) {
      submitBtn.disabled = false;
      setMsg("Something went wrong. Try again?", true);
      console.error(err);
    }
  });
</script>

</body>
</html>
