<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>PUBLIC FACING — Coming Soon</title>
<meta name="description" content="Public Facing by Lampwrecked — coming soon.">
<link rel="canonical" href="https://publicfacingpreview.lampwrecked.art/">
<meta property="og:title" content="Public Facing — Coming Soon">
<meta property="og:description" content="An open edition by Lampwrecked. Coming soon.">
<meta property="og:url" content="https://publicfacingpreview.lampwrecked.art/">
<meta name="twitter:card" content="summary_large_image">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

<style>
  /* Palette pulled from publicfacing.vercel.app */
  :root {
    --page:      #f3ede0;
    --card:      #f3ede0;
    --rule:      #1a1814;
    --ink:       #1a1814;
    --ink-soft:  #7a7166;
    --ink-faint: #a59c8c;
    --window:    #0a0907;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--page);
    color: var(--ink);
    font-family: "EB Garamond", Garamond, "Times New Roman", serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100%;
  }

  body {
    padding: clamp(20px, 6vw, 48px) clamp(16px, 5vw, 40px) clamp(40px, 8vw, 80px);
  }

  main {
    max-width: 560px;
    margin: 0 auto;
  }

  /* ---------------- page header ---------------- */

  header.page-head {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: clamp(12px, 3vw, 24px);
    align-items: end;
    padding-bottom: clamp(18px, 4vw, 26px);
    border-bottom: 1px solid var(--rule);
    margin-bottom: clamp(22px, 5vw, 32px);
  }

  .wordmark {
    font-family: "Cormorant Garamond", "EB Garamond", serif;
    font-weight: 400;
    font-size: clamp(28px, 8vw, 44px);
    line-height: 1.05;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .wordmark .line { display: block; }

  .byline {
    margin-top: clamp(8px, 2vw, 12px);
    font-style: italic;
    font-size: clamp(12px, 3vw, 15px);
    letter-spacing: 0.03em;
    color: var(--ink);
  }

  .meta {
    text-align: right;
    font-family: "Cormorant Garamond", serif;
    font-size: clamp(10px, 2.4vw, 12px);
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-soft);
    line-height: 1.6;
  }

  /* ---------------- matte (polaroid) ---------------- */

  .matte {
    background: var(--card);
    border: 1px solid var(--rule);
    padding: clamp(14px, 3.5vw, 22px) clamp(14px, 3.5vw, 22px) clamp(20px, 5vw, 32px);
  }

  .window {
    position: relative;
    aspect-ratio: 1 / 1;
    width: 100%;
    background: var(--window);
    overflow: hidden;
  }

  .layer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    will-change: opacity;
  }

  .layer.placeholder {
    background: var(--ph-color, #555);
    mix-blend-mode: screen;
    opacity: var(--ph-opacity, 0.85);
  }

  .placard {
    text-align: center;
    margin-top: clamp(18px, 4.5vw, 28px);
  }

  .placard-rule {
    width: 22%;
    height: 1px;
    margin: 0 auto clamp(14px, 3vw, 20px);
    background: var(--ink-soft);
    opacity: 0.55;
  }

  .placard .title {
    font-family: "Cormorant Garamond", "EB Garamond", serif;
    font-weight: 400;
    font-size: clamp(20px, 5.6vw, 30px);
    letter-spacing: 0.32em;
    text-transform: uppercase;
    line-height: 1.1;
    color: var(--ink);
  }

  .placard .by {
    margin-top: clamp(6px, 1.6vw, 10px);
    font-style: italic;
    font-size: clamp(12px, 2.8vw, 14px);
    letter-spacing: 0.04em;
    color: var(--ink);
  }
  .placard .by .name {
    font-style: normal;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-size: 0.92em;
  }

  .placard .status {
    margin-top: clamp(14px, 3.6vw, 20px);
    font-family: "Cormorant Garamond", serif;
    font-size: clamp(10px, 2.4vw, 11.5px);
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--ink-soft);
    padding-left: 0.5em;
  }

  /* ---------------- invite list (separate bubble) ---------------- */

  .invite {
    margin-top: clamp(20px, 5vw, 32px);
    background: var(--card);
    border: 1px solid var(--rule);
    padding: clamp(18px, 4.5vw, 28px) clamp(18px, 4.5vw, 28px) clamp(20px, 5vw, 30px);
    text-align: center;
  }

  .invite-label {
    font-family: "Cormorant Garamond", serif;
    font-size: clamp(11px, 2.6vw, 13px);
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--ink);
    padding-left: 0.5em;
  }

  .invite-sub {
    margin-top: clamp(8px, 2vw, 12px);
    font-style: italic;
    font-size: clamp(12px, 2.9vw, 14px);
    color: var(--ink-soft);
    letter-spacing: 0.02em;
    line-height: 1.4;
  }

  .invite-form {
    margin: clamp(16px, 4vw, 22px) auto 0;
    display: flex;
    align-items: stretch;
    justify-content: center;
    max-width: 380px;
    border-bottom: 1px solid var(--rule);
    padding: 4px 0 2px;
    transition: border-color 0.2s;
  }
  .invite-form:focus-within { border-bottom-color: var(--ink); }

  .invite-form input {
    flex: 1;
    min-width: 0;
    background: transparent;
    border: 0;
    outline: 0;
    font-family: "EB Garamond", serif;
    font-size: clamp(13px, 3.4vw, 15px);
    color: var(--ink);
    padding: 6px 4px;
    letter-spacing: 0.02em;
  }
  .invite-form input::placeholder {
    color: var(--ink-faint);
    font-style: italic;
  }

  .invite-form button {
    background: transparent;
    border: 0;
    cursor: pointer;
    font-family: "Cormorant Garamond", serif;
    font-weight: 400;
    font-size: clamp(10px, 2.4vw, 11.5px);
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: var(--ink);
    padding: 6px 4px 6px 14px;
    transition: opacity 0.2s, transform 0.2s;
    white-space: nowrap;
  }
  .invite-form button:hover { opacity: 0.55; }
  .invite-form button:active { transform: translateX(1px); }
  .invite-form button:disabled { opacity: 0.3; cursor: default; }

  .invite-msg {
    margin-top: clamp(10px, 2.4vw, 14px);
    min-height: 1.2em;
    font-style: italic;
    font-size: clamp(11px, 2.6vw, 13px);
    color: var(--ink-soft);
    letter-spacing: 0.02em;
    line-height: 1.4;
  }
  .invite-msg.error { color: #6b2a1f; }

  /* ---------------- footer ---------------- */

  .colophon {
    margin-top: clamp(28px, 6vw, 40px);
    text-align: center;
    font-family: "Cormorant Garamond", serif;
    font-size: 10px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
</style>
</head>
<body>

<main>
  <header class="page-head">
    <div>
      <h1 class="wordmark">
        <span class="line">Public</span>
        <span class="line">Facing</span>
      </h1>
      <p class="byline">Lampwrecked 2026</p>
    </div>
    <div class="meta">
      Coming<br>Soon
    </div>
  </header>

  <article class="matte" role="img" aria-label="Public Facing — portrait in flux">
    <div class="window" id="window"></div>

    <div class="placard">
      <div class="placard-rule"></div>
      <h2 class="title">Public&nbsp;Facing</h2>
      <p class="by">by <span class="name">Lampwrecked</span></p>
      <p class="status">Coming Soon</p>
    </div>
  </article>

  <aside class="invite" id="invite">
    <p class="invite-label">Invite List</p>
    <p class="invite-sub">Notice will be sent when minting opens.</p>
    <form id="signupForm" class="invite-form" novalidate>
      <input
        type="email"
        name="email"
        id="emailInput"
        required
        placeholder="your@email"
        autocomplete="email"
        spellcheck="false"
        autocapitalize="off"
        aria-label="Email address"
      >
      <button type="submit" id="submitBtn">Add Me</button>
    </form>
    <p class="invite-msg" id="rsvpMsg" aria-live="polite"></p>
  </aside>

  <p class="colophon">PF · MMXXVI</p>
</main>

<script>
  /* ============================================================
     TRAIT CONFIG — paste from your Google Sheet.
     Each layer renders BACK → FRONT in the order listed.
       path:  folder name (under BASE)
       count: number of sequentially-named files (1.png … N.png)
       files: OR explicit filename list
       ext:   default 'png'
     ============================================================ */
  const BASE = "./traits/";
  const TRAIT_LAYERS = [
    { name: "background", path: "background", count: 5 },
    { name: "body",       path: "body",       count: 5 },
    { name: "clothing",   path: "clothing",   count: 5 },
    { name: "neck",       path: "neck",       count: 5 },
    { name: "face",       path: "face",       count: 5 },
    { name: "hair",       path: "hair",       count: 5 },
    { name: "eyes",       path: "eyes",       count: 5 },
    { name: "mouth",      path: "mouth",      count: 5 }
  ];

  const PLACEHOLDER_TINTS = [
    "#5a3a2a", "#3a4a5a", "#7a6a4a", "#4a5a3a",
    "#6a3a4a", "#3a5a4a", "#5a4a6a", "#4a3a3a"
  ];

  const INTERVAL_MS = 95;
  const STAGGER_MS  = 18;

  const windowEl = document.getElementById("window");
  const layerImgs = [];
  const layerSources = [];

  TRAIT_LAYERS.forEach((layer, i) => {
    const img = document.createElement("img");
    img.className = "layer";
    img.alt = "";
    img.setAttribute("aria-hidden", "true");
    img.dataset.layer = layer.name;
    windowEl.appendChild(img);
    layerImgs.push(img);

    const sources = [];
    if (Array.isArray(layer.files)) {
      layer.files.forEach(f => sources.push(`${BASE}${layer.path}/${f}`));
    } else {
      const ext = layer.ext || "png";
      for (let n = 1; n <= (layer.count || 1); n++) {
        sources.push(`${BASE}${layer.path}/${n}.${ext}`);
      }
    }
    layerSources.push(sources);
  });

  function preload(url) {
    return new Promise((resolve, reject) => {
      const im = new Image();
      im.onload = () => resolve(url);
      im.onerror = () => reject(url);
      im.src = url;
    });
  }

  function activatePlaceholder(idx) {
    const img = layerImgs[idx];
    img.classList.add("placeholder");
    img.style.setProperty("--ph-color", PLACEHOLDER_TINTS[idx % PLACEHOLDER_TINTS.length]);
    img.style.setProperty("--ph-opacity", idx === 0 ? "1" : "0.55");
    img.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='1' height='1'/>";
  }

  const layerReady = layerSources.map(() => false);

  Promise.all(
    layerSources.map((urls, i) =>
      Promise.allSettled(urls.map(preload)).then(results => {
        const ok = results
          .filter(r => r.status === "fulfilled")
          .map(r => r.value);
        if (ok.length === 0) {
          activatePlaceholder(i);
        } else {
          layerSources[i] = ok;
          layerReady[i] = true;
          layerImgs[i].src = ok[Math.floor(Math.random() * ok.length)];
        }
      })
    )
  ).then(startLoop);

  function startLoop() {
    layerImgs.forEach((img, i) => {
      const tick = () => {
        if (layerReady[i]) {
          const urls = layerSources[i];
          if (urls.length > 1) {
            let next = img.src;
            for (let tries = 0; tries < 4 && next === img.src; tries++) {
              next = urls[Math.floor(Math.random() * urls.length)];
            }
            img.src = next;
          }
        }
      };
      setTimeout(() => setInterval(tick, INTERVAL_MS), i * STAGGER_MS);
    });
  }

  /* ============================================================
     EMAIL SIGNUP — set ENDPOINT below.
       Formspree:  "https://formspree.io/f/YOUR_FORM_ID"  (FORMAT="json")
       Vercel/Upstash:  "/api/subscribe"                  (FORMAT="json")
       Buttondown: "https://buttondown.email/api/emails/embed-subscribe/USERNAME"
                                                          (FORMAT="form")
     ============================================================ */
  const ENDPOINT = "https://formspree.io/f/YOUR_FORM_ID";
  const FORMAT   = "json";

  const signupForm = document.getElementById("signupForm");
  const emailInput = document.getElementById("emailInput");
  const submitBtn  = document.getElementById("submitBtn");
  const rsvpMsg    = document.getElementById("rsvpMsg");

  const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  function setMsg(text, isError) {
    rsvpMsg.textContent = text;
    rsvpMsg.classList.toggle("error", !!isError);
  }

  signupForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = emailInput.value.trim();

    if (!EMAIL_RE.test(email)) {
      setMsg("Please enter a valid email.", true);
      emailInput.focus();
      return;
    }
    if (ENDPOINT.includes("YOUR_FORM_ID")) {
      setMsg("Form endpoint not yet configured.", true);
      return;
    }

    submitBtn.disabled = true;
    setMsg("Sending…");

    try {
      let res;
      if (FORMAT === "form") {
        const body = new URLSearchParams();
        body.append("email", email);
        res = await fetch(ENDPOINT, { method: "POST", body });
      } else {
        res = await fetch(ENDPOINT, {
          method: "POST",
          headers: { "Accept": "application/json", "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });
      }

      if (res.ok || res.status === 302) {
        signupForm.style.display = "none";
        setMsg("You're on the list. Notice will arrive at opening.");
      } else {
        throw new Error("Bad response: " + res.status);
      }
    } catch (err) {
      submitBtn.disabled = false;
      setMsg("Something went wrong. Try again?", true);
      console.error(err);
    }
  });
</script>

</body>
</html>
